spring:
  application:
    name: lovableClone

  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://db.ybggislwzccxquzhqjmt.supabase.co:5432/postgres?sslmode=require
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:client-id}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:client-secret}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:api-key}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.4
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true

jwt:
  secret-key: ${JWT_SECRET_KEY:secret-key}

stripe:
  api:
    secret-key: ${STRIPE_SECRET_KEY:secret-key}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:secret}

client.url: ${CLIENT_URL:http://localhost:5173}

logging:
  level:
    org.springframework.ai:
      chat.client: DEBUG

minio:
  url: https://ead38d510292f1d0c211505e945022c3.r2.cloudflarestorage.com #http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:minio}
  secret-key: ${MINIO_SECRET_KEY:minio}
  bucket: lovable
