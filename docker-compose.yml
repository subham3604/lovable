services:
  pgvector:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    container_name: pgvector_db_lovable
    environment:
      POSTGRES_DB: pgvector_lovable_test
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql
    restart:
      unless-stopped

  minio:
    image: minio/minio
    container_name: minio_lovable
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio-data:/data
      - /Users/subham/Downloads/minio.license:/minio/minio.license
    restart:
      unless-stopped

volumes:
  minio-data:
  pgvector-data:
